<div class="create-container">
  <h1>Nuevo producto</h1>

  <form [formGroup]="form" (ngSubmit)="onCreate()">
    <div>
      <label>Título</label>
      <input formControlName="title" required />
    </div>

    <div>
      <label>Precio</label>
      <input type="number" step="0.01" formControlName="price" required />
    </div>

    <div>
      <label>Categoría</label>
      <input formControlName="category" required />
    </div>

    <div>
      <label>Descripción</label>
      <textarea formControlName="description" required></textarea>
    </div>

    <div>
      <label>URL Imagen (opcional)</label>
      <input formControlName="image" />
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button type="submit" [disabled]="isLoading">
      <span *ngIf="!isLoading">Crear</span>
      <span *ngIf="isLoading">Creando...</span>
    </button>
  </form>
</div>
