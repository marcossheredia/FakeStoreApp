<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">🛍️</div>
      <h1>FakeStore</h1>
      <p class="subtitle">Acceso a tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-control"
            placeholder="Ingresa tu email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-control"
            placeholder="Ingresa tu contraseña"
            required
          />
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error" role="alert">
        <span>⚠️</span> {{ error }}
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Entrar</span>
        <span *ngIf="isLoading" class="spinner">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Cargando...
        </span>
      </button>

      <div class="login-footer">
        <p>
          ¿No tienes cuenta?
          <a routerLink="/auth/register">Regístrate</a>
        </p>
        <p class="back-link">
          <a routerLink="/" class="link-secondary">← Volver al inicio</a>
        </p>
      </div>
    </form>
  </div>
</div>
