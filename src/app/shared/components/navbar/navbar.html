<nav class="navbar">
  <!-- Logo -->
  <div class="navbar-brand">
    <a routerLink="/" class="brand-link">🛒 FakeStore</a>
  </div>

  <!-- Enlaces centrales -->
  <div class="navbar-menu">
    <a routerLink="/" class="nav-link">🏠 Inicio</a>
    <a routerLink="/products" class="nav-link" *ngIf="auth.isAuthenticated()">📦 Productos</a>
    <a routerLink="/dashboard" class="nav-link">📊 Panel de Control</a>
  </div>

  <!-- Zona usuario autenticado -->
  <div *ngIf="auth.isAuthenticated(); else guest" class="user-section">
    <div class="avatar" (click)="toggleMenu()">
      <span class="avatar-icon">👤</span>
      <span class="username">{{ user?.username }}</span>
      <span class="dropdown-icon" [class.active]="showMenu">▼</span>
    </div>

    <div class="dropdown-menu" *ngIf="showMenu">
      <div class="dropdown-header">
        <div class="user-info">
          <span class="info-item"><strong>Usuario:</strong> {{ user?.username }}</span>
          <span class="info-item"><strong>Rol:</strong> {{ user?.role }}</span>
        </div>
      </div>
      <button class="btn-logout" (click)="auth.logout()">🚪 Cerrar sesión</button>
    </div>
  </div>

  <!-- Zona invitado -->
  <ng-template #guest>
    <div class="guest-actions">
      <a routerLink="/auth/login" class="nav-link">Iniciar sesión</a>
      <a routerLink="/auth/register" class="nav-link">Registrarse</a>
    </div>
  </ng-template>
</nav>
